name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: make release

      - name: Package
        run: make dist

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AgentGuard ${{ steps.version.outputs.tag }}
          files: dist/AgentGuard.zip
          generate_release_notes: true
